<!DOCTYPE html>
<html>
<head>
    <title>{{ page_title }}</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f4f4f4; }
        h1 { font-size: 2.5em; margin-bottom: 20px; text-align: center; }
        #countdown { font-size: 1.5em; font-weight: bold; margin-bottom: 20px; }
        #entry { font-size: 2em; font-weight: bold; color: #333; margin-bottom: 20px; padding: 10px; border: 2px solid #ccc; border-radius: 10px; background-color: #fff; text-align: center; }
        button { font-size: 1.2em; padding: 10px 20px; margin-bottom: 10px; background-color: #007BFF; color: white; border: none; border-radius: 5px; cursor: pointer; transition: background-color 0.3s; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <h1>{{ page_title }}</h1>
    <div id="countdown">Loading countdown...</div>
    <div id="entry"></div>
    <button onclick="getRandomEntry()">Get New Entry</button>
    <button onclick="startAutoRefresh()">Start Auto-Refresh</button>

    <script>
        function getRandomEntry() {
            $.get('/random_entry', function(data) {
                $('#entry').text(data.entry);
            });
        }

        $(document).ready(function() {
            getRandomEntry();
        });

        // Countdown
        const targetDate = new Date("{{ countdown_date }}").getTime();
        function updateCountdown() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            if(diff <= 0){
                $('#countdown').text("🎉 The day has arrived!");
                return;
            }
            const days = Math.floor(diff / (1000*60*60*24));
            const hours = Math.floor((diff / (1000*60*60)) % 24);
            const minutes = Math.floor((diff / (1000*60)) % 60);
            const seconds = Math.floor((diff / 1000) % 60);
            $('#countdown').text(`⏳ ${days} days ${hours}h ${minutes}m ${seconds}s to go`);
        }
        setInterval(updateCountdown, 1000);

        function startAutoRefresh() {
            window.location.href = "/refresh";
        }
    </script>
</body>
</html>
